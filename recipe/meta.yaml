{% set name = "burau" %}
{% set version = "0.0.4" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/burau-{{ version }}.tar.gz
  sha256: 63c2f3eb6a98422fea49166bb4ab0d91b713ccb4b6217aeea9a68cb081aae586

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - numba
    - numpy
    - python >={{ python_min }}

test:
  imports:
    - burau
    - tests
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/fuglede/burau
  summary: Search for non-trivial elements of the kernel of the Burau representation of the four-strand braid group.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fuglede
